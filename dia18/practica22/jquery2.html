<DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>uso de jquery</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
        <script>
            $(document).ready(function() {
                $("#ocultar").click(function(){
                   $("p").hide()
                })
                $("#ver").click(function() {
                    $("p").show()
                })
            })
        </script>
        <head>
        <body>
            <button id="ocultar">ocultar</button>
            <button id="ver">ver</button>
            <h2>introduccion a jquery</h2>
            <p>haz que el titulo tambien se oculte al hacer click en el mismo</p>
            

        </body>
        </head>
