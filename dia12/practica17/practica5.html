<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>mayor o menor javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let edad = parseInt(prompt("escribe tu edad: "))
            if(edad >= 18){
                document.write( edad + " es mayor")
            }else{
                document.write( edad + " es menor")
            }
        </script>
    </body>
</html>
