<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>tabla de multiplicar javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            for(let y = 1 ; y < 11 ; y++){
                for(let x = 0 ; x < 11 ; x++){
                    document.write( "<br>"+ y +" x " + x + " = " + (y * x) )
                }
                document.write("<hr>")
            }
        </script>
    </body>
</html>
