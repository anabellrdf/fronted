<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>par o impar javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let numero = parseInt(prompt("escribe un numero: "))
            if(numero % 2 == 0){
                document.write( numero + " es par")
            }else{
                document.write( numero + " es impar")
            }
        </script>
    </body>
</html>
