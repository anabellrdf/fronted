<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>calculadora javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let num1 = 10
            let num2 = 5
            let operacion = '/'
            let resultado
            if(operacion == '+'){
                resultado = num1 + num2
            }else if(operacion == '-'){
                resultado = num1 - num2
            }else if(operacion == '*'){
                resultado = num1 * num2
            }else if(operacion == '/'){
                resultado = num1 / num2
            }
            document.write("resultado: " + resultado)
            console.log("resoltado: " + resultado)
        </script>
    </body>
</html>
