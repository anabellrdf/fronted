<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>pokedex</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        img{
            width: 150px;
        }
    </style>
</head>
<body>
    <h1>informacion de....</h1>
    <div id="info">
        <p>cargando...</p>
    </div>
    <script>
        const apiUrl = 'https://pokeapi.co/api/v2/pokemon/raichu'

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('error al obtener los datos')
                return response.json()
            })
            .then(data => {
                const infoDiv = document.getElementById('info')
                const nombre = data.name
                const id = data.id
                const altura = data.height
                const peso = data.weight
                const imagen = data.sprites.front_default
                const tipos = data.types.map(t => t.type.name).join(', ')
                infoDiv.innerHTML = `
                    <p><strong>id:</strong> ${id}</p>
                    <p><strong>nombre:</strong> ${nombre}</p>
                    <p><strong>altura:</strong> ${altura * 10} cm</p>
                    <p><strong>peso:</strong> ${peso /10} kg</p>
                    <p><strong>tipo(s):</strong> ${tipos}</p>
                    <img src="${imagen}" alt="${nombre}">
                `

            })
            .catch(error =>{
                document.getElementById('info').innerHTML = `<p>Error: ${error.message}</p>`
            })
    </script>
</body>

</html>
