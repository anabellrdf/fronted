<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>practica 12</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
           let suma = 0
           while (suma < 100){
            let num = parseInt(prompt("introduce un numero:"))
            suma += num
           }
           console.log("suma total:", suma)
        </script>
    </body>
</html>
