<!DOCTYPE html>
<html lang="es-PY">

        <title>practica 18</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            function mayor(a,b,c){
                return Math.max(a,b,c)
            }
            function raizCuadrada(a){
                return Math.sqrt(a)
            }
            document.write("mayor: " + mayor(0,8,2))
            document.write("<br> raiz cuadrada: " + raizCuadrada(20))
        </script>
    </body>
