<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>practica 17</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            function promendio(notas) {
                let suma = 0
                for (let nota of notas) suma += nota
                return suma / notas.length
            }
        document.write(promendio([78, 70]))
        </script>
    </body>
</html>
