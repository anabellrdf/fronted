<!DOCTYPE html>
<html lang="es-PY">
    <head>
        <title>tabla de multiplicar2 javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let numero = parseInt(prompt("introduce un numero:"))
            for(let i =1 ; i <= 10; i++){
                document.write(`<br>${numero} x ${i} = ${numero * i}`)
            }
        </script>
    </body>
</html>
