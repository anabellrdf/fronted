<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="Viewport" content="width=device-width, initial-scale=1.0">
        <title>buscador de peliculas y series - tmdb</title>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <div class="container py-5">
            <div class="text-center mb-4">
                <h1 class="titulo-app">buscador de peliculas y series</h1>
                <p class="text-muted">consumo de la api de tmdb con jquery</p>
            </div>
            <div class="row justify-content-center mb-4">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group input-group-lg">
                        <input type="text" id="txtBusqueda" class="from-control" placeholder="escribe el nombre de una pelicula o serie...">
                        <button id="btnBuscar" class="btn btn-primary">buscar</button>
                    </div>
                </div>
            </div>
            <div id="mensaje" class="text-center text-muted mb-4"></div>
            <div id="resultados" class="row g-4"></div>
        </div>
        <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </body>
</html>
