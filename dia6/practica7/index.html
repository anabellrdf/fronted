<!DOCTYPE html>
<html>
    <head>
        <title>Calculadora</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="imagenes/icono.ico">
    </head>
    <body>
        <h1>Calculadora 1.0</h1>
        <input type="number" id="num1" placeholder="Numero: 1">
        <select id="operacion">
            <option value="suma">+</option>
            <option value="resta">-</option>
            <option value="multiplicacion">x</option>
            <option value="division">%</option>
        </select>
        <input type="number" id="num2" placeholder="Numero: 2">
        <button id="igual">=</button>
        <input type="text" id="resultado" readonly> <!--readonly: solo leer-->
    </body>
    <script src="script.js"></script>
</html>
